<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>TikTok Like Battle Arena</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Battle Arena">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0b0620; --night2:#1a1040; --neon-pink:#ff3d8b; --neon-cyan:#31e6ff;
    --gold:#ffd24d; --ink:#f4efff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--night);
    font-family:'Kanit','M PLUS Rounded 1c',sans-serif;color:var(--ink);
    user-select:none;-webkit-user-select:none}
  #stage{position:fixed;inset:0}
  canvas{display:block}

  /* ---------- top bar ---------- */
  #topbar{position:fixed;top:0;left:0;right:0;z-index:20;
    padding:calc(env(safe-area-inset-top) + 6px) 12px 6px;
    display:flex;justify-content:flex-end;align-items:center;pointer-events:none}
  #logo{font-weight:800;font-size:17px;letter-spacing:.5px;
    background:linear-gradient(90deg,var(--neon-pink),var(--neon-cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 18px rgba(255,61,139,.35)}
  #langSwitch{display:flex;gap:4px;pointer-events:auto}
  #langSwitch button{font-family:inherit;font-weight:600;font-size:12px;color:#cbb8ff;
    background:rgba(255,255,255,.07);border:1px solid rgba(203,184,255,.25);
    border-radius:999px;padding:4px 10px;cursor:pointer}
  #langSwitch button.on{color:#0b0620;background:var(--neon-cyan);border-color:var(--neon-cyan)}

  /* ---------- boss bar ---------- */
  #bossBar{position:fixed;left:12px;right:12px;z-index:18;pointer-events:none;
    top:calc(env(safe-area-inset-top) + 46px);text-align:center}
  #bossName{font-size:15px;font-weight:800;color:#ffb3c8;text-shadow:0 0 12px rgba(255,61,139,.7);margin-bottom:3px}
  .bbar{height:12px;border-radius:6px;background:rgba(0,0,0,.6);overflow:hidden;
    border:1px solid rgba(255,61,139,.5);margin:0 auto 3px;max-width:520px}
  .bbar i{display:block;height:100%;background:linear-gradient(90deg,#ff2d55,#ff6b8d);
    transition:width .25s;border-radius:6px}
  .bbar.mp{height:6px;max-width:400px;border-color:rgba(180,77,255,.5)}
  .bbar.mp i{background:linear-gradient(90deg,#8a2be2,#c56bff)}
  #bossStun{font-size:12px;color:#7cf5ff;height:16px;font-weight:600}

  /* ---------- like/gift feed ---------- */
  #feed{position:fixed;right:8px;top:26%;z-index:15;display:flex;flex-direction:column;
    gap:5px;align-items:flex-end;pointer-events:none;max-width:52vw}
  .feedItem{font-size:12.5px;font-weight:600;padding:4px 10px;border-radius:999px;
    background:rgba(10,5,30,.72);border:1px solid rgba(49,230,255,.35);
    animation:feedIn .3s ease-out;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .feedItem.gift{border-color:var(--gold);color:var(--gold);box-shadow:0 0 12px rgba(255,210,77,.35)}
  .feedItem.fade{opacity:0;transition:opacity .8s}
  @keyframes feedIn{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}

  /* ---------- MC bar ---------- */
  #mcBar{position:fixed;left:10px;right:10px;z-index:20;
    bottom:calc(env(safe-area-inset-bottom) + 10px);
    display:flex;align-items:flex-end;gap:8px;pointer-events:none}
  #mcFace{width:52px;height:52px;flex:none;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#ff7ab1,var(--neon-pink) 70%);
    border:2px solid var(--neon-cyan);display:flex;align-items:center;justify-content:center;
    font-size:26px;box-shadow:0 0 16px rgba(49,230,255,.45)}
  #mcFace.talking{animation:mcTalk .35s infinite alternate}
  @keyframes mcTalk{from{transform:scale(1)}to{transform:scale(1.08)}}
  #mcText{flex:1;background:rgba(12,6,32,.85);border:1px solid rgba(255,61,139,.5);
    border-radius:14px 14px 14px 4px;padding:9px 13px;font-size:14.5px;line-height:1.35;
    min-height:44px;box-shadow:0 4px 18px rgba(0,0,0,.45)}
  #mcName{font-size:10.5px;font-weight:800;color:var(--neon-cyan);letter-spacing:1px;margin-bottom:1px}

  /* ---------- gacha overlay ---------- */
  #gachaOverlay{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
    flex-direction:column;background:rgba(5,2,16,.55);backdrop-filter:blur(2px)}
  #gachaOverlay.show{display:flex}
  #capsule{width:120px;height:120px;position:relative;animation:capDrop .7s cubic-bezier(.3,1.6,.5,1)}
  #capsule.shake{animation:capShake .12s infinite}
  #capTop,#capBot{position:absolute;left:0;width:120px;height:60px;transition:transform .35s cubic-bezier(.5,-.6,.5,1.6)}
  #capTop{top:0;border-radius:60px 60px 0 0;background:linear-gradient(160deg,#ff86b8,var(--neon-pink))}
  #capBot{bottom:0;border-radius:0 0 60px 60px;background:linear-gradient(20deg,#dfe8ff,#fff)}
  #capsule.open #capTop{transform:translateY(-70px) rotate(-25deg)}
  #capsule.open #capBot{transform:translateY(40px) rotate(12deg)}
  #gachaItem{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:56px;
    filter:drop-shadow(0 0 14px rgba(255,255,255,.8));transition:transform .4s cubic-bezier(.3,1.8,.5,1)}
  #capsule.open #gachaItem{transform:translate(-50%,-58px) scale(1.25)}
  #gachaLabel{margin-top:66px;text-align:center}
  #gachaWho{font-size:14px;font-weight:600;color:#cbb8ff}
  #gachaName{font-size:21px;font-weight:800;margin-top:2px}
  #gachaTier{display:inline-block;margin-top:5px;font-size:11.5px;font-weight:800;letter-spacing:2px;
    padding:2px 12px;border-radius:999px;border:1px solid currentColor}
  @keyframes capDrop{from{transform:translateY(-70vh) rotate(-30deg)}to{transform:none}}
  @keyframes capShake{0%{transform:rotate(-6deg)}100%{transform:rotate(6deg)}}
  .tier-common{color:#9fd8ff}.tier-rare{color:#5c8dff}.tier-epic{color:#c65cff}.tier-legendary{color:var(--gold)}

  /* ---------- winner ---------- */
  #winner{position:fixed;inset:0;z-index:35;display:none;flex-direction:column;align-items:center;
    justify-content:center;background:radial-gradient(circle,rgba(60,20,90,.75),rgba(5,2,16,.92));text-align:center}
  #winner.show{display:flex}
  #winCrown{font-size:76px;animation:crownFloat 1.6s ease-in-out infinite}
  #winName{font-size:32px;font-weight:800;color:var(--gold);text-shadow:0 0 26px rgba(255,210,77,.7);margin-top:6px}
  #winTitle{font-size:15px;letter-spacing:4px;color:var(--neon-cyan);font-weight:600}
  @keyframes crownFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

  /* ---------- start overlay ---------- */
  #startOverlay{position:fixed;inset:0;z-index:50;background:var(--night);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  #startLogo{font-size:30px;font-weight:800;text-align:center;line-height:1.25;
    background:linear-gradient(90deg,var(--neon-pink),var(--gold),var(--neon-cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  #startBtn{font-family:inherit;font-size:20px;font-weight:800;color:#0b0620;
    background:linear-gradient(90deg,var(--neon-cyan),#7cf5ff);border:none;border-radius:999px;
    padding:16px 54px;cursor:pointer;box-shadow:0 0 34px rgba(49,230,255,.55);
    animation:pulse 1.6s infinite}
  #startNote{font-size:12.5px;color:#8f7fc0;text-align:center;padding:0 30px;line-height:1.6}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

  .shakeScreen{animation:scrShake .45s}
  @keyframes scrShake{0%,100%{transform:none}20%{transform:translate(-9px,5px)}40%{transform:translate(8px,-6px)}
    60%{transform:translate(-6px,-4px)}80%{transform:translate(5px,6px)}}
  #flash{position:fixed;inset:0;z-index:28;background:#fff;opacity:0;pointer-events:none;transition:opacity .5s}
</style>
</head>

  specHeavy:'☄️', reflect:'🪞', meteor:'🌋', revive:'✨', ultimate:'💥' };

let lang = localStorage.getItem('arenaLang') || 'th';
let config = null;

function fmt(tpl, params) {
  return String(tpl).replace(/\{(\w+)\}/g, (_, k) => params && k in params ? params[k] : '');
}
function applyLang() {
  document.querySelectorAll('#langSwitch button').forEach(b => b.classList.toggle('on', b.dataset.lang === lang));
  const d = I18N[lang];
  const params = { n: config ? config.likesToSpawn : 50 };
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = fmt(d[el.dataset.i18n] || '', params);
  });
  document.getElementById('mcName').textContent = d.mcName;
}
document.querySelectorAll('#langSwitch button').forEach(b => b.onclick = () => {
  lang = b.dataset.lang; localStorage.setItem('arenaLang', lang); applyLang();
});

/* ================= audio (WebAudio SFX + custom overrides) ================= */
let AC = null;
const customAudio = {}; // key -> HTMLAudio
function unlockAudio() {
  AC = AC || new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
}
function tone(freq, dur, type = 'square', vol = 0.14, slide = 0) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g).connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur);
}
/* เล่นไฟล์เสียงผ่าน WebAudio (iOS อนุญาตหลังปลดล็อก AudioContext แล้ว) */
const bufCache = {};
async function playUrl(url, { loop = false, vol = 1 } = {}) {
  if (!AC) return null;
  try {
    if (!bufCache[url]) {
      const ab = await (await fetch(url)).arrayBuffer();
      bufCache[url] = await AC.decodeAudioData(ab);
    }
    const src = AC.createBufferSource();
    src.buffer = bufCache[url];
    src.loop = loop;
    const g = AC.createGain(); g.gain.value = vol;
    src.connect(g).connect(AC.destination);
    src.start();
    return src;
  } catch { return null; }
}
function playCustom(key) {
  const url = config && config.assets && (key === 'gacha' ? config.assets.sfx.gacha :
    key === 'basic' ? config.assets.sfx.basic : config.assets.sfx['spec_' + key]);
  if (url) { playUrl(url); return true; }
  return false;
}
const SFX = {
  basic() { if (playCustom('basic')) return; tone(700, .12, 'square', .12, -400); },
  hit()   { tone(140, .16, 'sawtooth', .18, -60); },
  block() { tone(900, .1, 'triangle', .14); tone(1300, .12, 'triangle', .1); },

const mcQueue = [];      // {text}
let mcBusy = false;
let ruleIdx = 0;
let lastRuleAt = 0;

function mcText(key, params) {
  const d = I18N[lang].mc;
  let p = { ...params };
  if (p.item) p.item = I18N[lang].items[p.item] || p.item;
  if (key === 'rules') return fmt(d.rules[params.i], ruleParams());
  return fmt(d[key] || '', p);
}
function ruleParams() {
  return {
    spawn: config ? config.likesToSpawn : 50,
    gacha: config ? config.likesPerGacha : 50,
    inactive: config ? config.inactivitySeconds : 60
  };
}
function mcSay(key, params, priority) {
  const text = mcText(key, params);
  if (!text) return;
  if (priority) mcQueue.unshift({ text });
  else mcQueue.push({ text });
  if (mcQueue.length > 6) mcQueue.length = 6;
  pumpMC();
}
async function pumpMC() {
  if (mcBusy || !mcQueue.length) return;
  mcBusy = true;
  const { text } = mcQueue.shift();
  const msgEl = document.getElementById('mcMsg');
  const face = document.getElementById('mcFace');
  msgEl.textContent = text;
  face.classList.add('talking');
  try {
    if (!AC) throw new Error('no audio ctx');
    if (AC.state === 'suspended') { try { await AC.resume(); } catch {} }
    const ctrl = new AbortController();
    const kill = setTimeout(() => ctrl.abort(), 7000); // TTS ช้าเกิน 7 วิ = ข้ามไป fallback
    const r = await fetch('/api/tts?lang=' + lang + '&text=' + encodeURIComponent(text), { signal: ctrl.signal });
    clearTimeout(kill);
    if (!r.ok) throw new Error('tts ' + r.status);
    const ab = await r.arrayBuffer();
    const buf = await AC.decodeAudioData(ab);
    await new Promise((resolve) => {
      const src = AC.createBufferSource();
      src.buffer = buf;
      src.connect(AC.destination);
      src.onended = resolve;
      src.start();
      setTimeout(resolve, buf.duration * 1000 + 1500); // กันค้าง
    });
  } catch {
    // fallback: Web Speech API
    await new Promise((resolve) => {
      try {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang === 'th' ? 'th-TH' : lang === 'ja' ? 'ja-JP' : 'en-US';
        u.onend = resolve; u.onerror = resolve;
        speechSynthesis.speak(u);
        setTimeout(resolve, 8000);
      } catch { resolve(); }
    });
  }
  face.classList.remove('talking');
  mcBusy = false;
  setTimeout(pumpMC, 350);
}

  const ar = a >> 16 & 255, ag = a >> 8 & 255, ab = a & 255;
  const br = b >> 16 & 255, bg = b >> 8 & 255, bb = b & 255;
  return ((ar + (br - ar) * t) << 16) | ((ag + (bg - ag) * t) << 8) | (ab + (bb - ab) * t);
}

function palette(i) {
  const hue = (i * 137.508) % 360;
  return {
    body: hsl(hue, 78, 58), body2: hsl(hue, 78, 40),
    head: hsl((hue + 30) % 360, 70, 72),
    acc: hsl((hue + 180) % 360, 85, 60),
    accessory: i % 5, shape: i % 3
  };
}
function hsl(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return (Math.round(f(0) * 255) << 16) | (Math.round(f(8) * 255) << 8) | Math.round(f(4) * 255);
}
function buildCharacter(seed) {

function spawnBurst(x, y, color, n = 14, speed = 5) {

    p.x = x; p.y = y;
    const a = Math.random() * Math.PI * 2, v = speed * (0.4 + Math.random());
    p.vx = Math.cos(a) * v; p.vy = Math.sin(a) * v;
    fxLayer.addChild(p);
    const tick = (delta) => {
      p.x += p.vx * delta; p.y += p.vy * delta; p.vy += 0.15 * delta;
      p.alpha -= 0.03 * delta;
      if (p.alpha <= 0) { app.ticker.remove(tick); p.destroy(); }
    };
    app.ticker.add(tick);
  }
}
const TIER_COLOR = { common: 0x6ecbff, rare: 0x4d7bff, epic: 0xb44dff, legendary: 0xffd24d };
function projectile(fromC, toC, color, size, onArrive, arc) {
  const p = new PIXI.Graphics().beginFill(color).drawCircle(0, 0, size).endFill();
  const glow = new PIXI.Graphics().beginFill(color, .3).drawCircle(0, 0, size * 2).endFill();
  p.addChildAt(glow, 0);
  const x0 = fromC.x, y0 = fromC.y - 90, x1 = toC.x, y1 = toC.y - 90;
  p.x = x0; p.y = y0;
  fxLayer.addChild(p);
  let t = 0;
  const dur = 0.5;
  const tick = (delta) => {
    t += delta / 60 / dur;
    if (t >= 1) {
      app.ticker.remove(tick); p.destroy();
      spawnBurst(x1, y1, color, 16, 6);
      if (onArrive) onArrive();
      return;
    }
    p.x = x0 + (x1 - x0) * t;
    p.y = y0 + (y1 - y0) * t - (arc ? Math.sin(t * Math.PI) * 160 : 0);
  };
  app.ticker.add(tick);

/* ----- main render loop: interpolation + idle/walk anims ----- */
app.ticker.add((delta) => {
  if (bossC) {
    bossC.animT += delta / 60;
    bossC.scale.set(bossC.baseScale * (1 + Math.sin(bossC.animT * 2.2) * 0.02));
    if (bossC.gfx && bossData) {
      if (bossData.stunned && bossC.gfx.tint === 0xffffff) bossC.gfx.tint = 0x7cd8ff;
      else if (!bossData.stunned && bossC.gfx.tint === 0x7cd8ff) bossC.gfx.tint = 0xffffff;
    }
  }
  for (const c of chars.values()) {
    // อนิเมชันเกิด: ขยายจาก 0 → 1 แบบเด้ง
    if (c.scale.x < 1) c.scale.set(Math.min(1, c.scale.x + 0.09 * delta));
    const k = 0.16 * delta;
    const dx = c.tx - c.x, dy = c.ty - c.y;
    c.x += dx * k; c.y += dy * k;
    c.zIndex = c.y;
    const moving = Math.hypot(dx, dy) > 3;
    c.animT += delta / 60;
    const dir = c.data.facing || 1;
    c.bodyC.scale.x = dir;
    if (moving) {
      c.bodyC.y = -Math.abs(Math.sin(c.animT * 9)) * 8;
      if (c.legL) { c.legL.rotation = Math.sin(c.animT * 11) * .6; c.legR.rotation = -Math.sin(c.animT * 11) * .6; }
    } else {
      c.bodyC.y = Math.sin(c.animT * 2.4) * 3;
      if (c.legL) { c.legL.rotation = 0; c.legR.rotation = 0; }
    }
  }
});

  const cap = document.getElementById('capsule');
  document.getElementById('gachaItem').textContent = ITEM_ICONS[ev.item] || '🎁';
  document.getElementById('gachaWho').textContent = ev.name;
  document.getElementById('gachaName').textContent = '';
  const tierEl = document.getElementById('gachaTier');
  tierEl.textContent = I18N[lang].tier[ev.tier];
  tierEl.className = 'tier-' + ev.tier;
  cap.className = '';
  ov.classList.add('show');
  SFX.gacha();
  setTimeout(() => cap.classList.add('shake'), 750);
  setTimeout(() => {
    cap.classList.remove('shake');
    cap.classList.add('open');
    SFX.pop();
    document.getElementById('gachaName').textContent = I18N[lang].items[ev.item] || ev.item;
  }, 1650);
  setTimeout(() => {
    ov.classList.remove('show');
    gachaShowing = false;
    pumpGacha();
  }, 3400);
}

/* ================= feed ================= */
function addFeed(ev) {
  const el = document.createElement('div');
  el.className = 'feedItem' + (ev.kind === 'gift' ? ' gift' : '');
  el.textContent = (ev.kind === 'gift' ? '🎁 ' : '❤️ ') + ev.name + ' +' + ev.count + (ev.kind === 'gift' ? ' 💎' : '');
  const feed = document.getElementById('feed');
  feed.appendChild(el);
  while (feed.children.length > 8) feed.removeChild(feed.firstChild);
  setTimeout(() => el.classList.add('fade'), 5000);
  setTimeout(() => el.remove(), 6000);
}

/* ================= socket ================= */
const socket = io();
let started = false;

socket.on('connect', () => socket.emit('joinArena'));
socket.on('init', (d) => {
  config = d.config;
  applyLang();
  setArenaBg(d.boss && d.boss.bg);
  d.players.forEach(addChar);
  if (d.boss && d.boss.alive) buildBoss(d.boss);
});
socket.on('configChanged', (c) => { config = c; applyLang(); }); // ฉากใหม่จะถูกสุ่มใช้ตอนบอสตัวถัดไปเกิด
socket.on('state', (snap) => {
  (snap.players || []).forEach(updateCharSafe);
  if (snap.boss) {
    bossData = snap.boss;
    updateBossBar();
    if (snap.boss.alive && !bossC) buildBoss(snap.boss);
  }
});
function updateCharSafe(d) { if (chars.has(d.id)) updateChar(d); else addChar(d); }
socket.on('spawn', (d) => { addChar(d); document.getElementById('winner').classList.remove('show'); });
// ท่าไม้ตายจากกาชา → ใส่บอส
socket.on('attack', (ev) => {
  const from = chars.get(ev.from);
  lunge(from);
  if (!bossC) return;
  const bossTarget = { x: bossC.x, y: bossC.y + 60 };
  if (ev.type === 'meteor') {
    SFX.spec('legendary');
    // อุกกาบาตตกจากฟ้าใส่บอส
    const rock = new PIXI.Graphics().beginFill(0xff7733).drawCircle(0, 0, 34).endFill();
    rock.x = bossC.x; rock.y = -80;
    fxLayer.addChild(rock);
    const tick = (delta) => {
      rock.y += 22 * delta;
      if (rock.y >= bossC.y - 120) {
        app.ticker.remove(tick); rock.destroy();
        spawnBurst(bossC.x, bossC.y - 120, 0xff7733, 30, 9);
        screenFlash(); screenShake();
        bossHurt(ev.dmg);
      }
    };
    app.ticker.add(tick);
  } else {
    SFX.spec(ev.tier);
    if (ev.tier === 'epic' || ev.tier === 'legendary') { screenShake(); if (ev.tier === 'legendary') screenFlash(); }
    if (from) projectile(from, bossTarget, TIER_COLOR[ev.tier] || 0xffffff, ev.tier === 'legendary' ? 16 : 11,
      () => bossHurt(ev.dmg), true);
  }
});

// ไลค์ = ฮีโร่โจมตีบอส
socket.on('heroAttack', (ev) => {
  const from = chars.get(ev.from);
  lunge(from);
  SFX.basic();
  if (from && bossC) {
    projectile(from, { x: bossC.x + rand2(-70, 70), y: bossC.y - 60 }, 0xffb84d, 8,
      () => { if (ev.dmg > 0) bossHurt(ev.dmg); else bossHurt(0); });
  }
});

// บอสเตือนโซนโจมตี (วงแดงกะพริบ)
socket.on('bossTelegraph', (ev) => {
  SFX.warn();
  // บอสเงื้อตัวเตรียมปล่อยพลัง
  if (bossC) {
    let bt = 0;
    const btick = (delta) => {
      bt += delta / 60;
      bossC.baseScale = Math.min(1.45, 1 + (bossData ? bossData.level : 1) * 0.03) * (1 + Math.sin(Math.min(bt / .5, 1) * Math.PI) * 0.12);
      if (bt >= .5) { bossC.baseScale = Math.min(1.45, 1 + (bossData ? bossData.level : 1) * 0.03); app.ticker.remove(btick); }
    };
    app.ticker.add(btick);
  }
  // วงรีเตือนบนพื้นแบบมีมิติ (แนวนอน) + วงในหดเข้า
  const rx = ev.rx || ev.r || 160, ry = ev.ry || Math.round((ev.r || 160) * .45);
  const g = new PIXI.Graphics();
  fxLayer.addChild(g);
  let t = 0; const dur = ev.warnMs / 1000 + 1.6;
  const warnDur = ev.warnMs / 1000;
  const tick = (delta) => {
    t += delta / 60;
    g.clear();
    const a = .16 + .14 * Math.abs(Math.sin(t * 14));
    // วงนอก
    g.lineStyle(5, 0xff3040, .95).beginFill(0xff3040, a).drawEllipse(ev.x, ev.y, rx, ry).endFill();
    // วงในหดลงตามเวลานับถอยหลัง (บอกจังหวะฟาด)
    const k = Math.max(0, 1 - t / warnDur);
    if (k > 0) g.lineStyle(3, 0xffb3c0, .9).drawEllipse(ev.x, ev.y, rx * k, ry * k);
    // เส้นกากบาทกลาง
    g.lineStyle(2, 0xff3040, .5).moveTo(ev.x - rx, ev.y).lineTo(ev.x + rx, ev.y);
    if (t >= dur) { app.ticker.remove(tick); g.destroy(); }
  };
  app.ticker.add(tick);
});

// บอสฟาดลงโซน
socket.on('bossStrike', (ev) => {
  // ลูกไฟพุ่งจากบอสไปยังโซน แล้วค่อยระเบิด+คิดดาเมจ
  const from = bossC ? { x: bossC.x, y: bossC.y - 150 } : { x: 500, y: 600 };
  const ball = new PIXI.Graphics().beginFill(0xff5030).drawCircle(0, 0, 20).endFill();
  const glow = new PIXI.Graphics().beginFill(0xff9060, .35).drawCircle(0, 0, 36).endFill();
  ball.addChildAt(glow, 0);
  ball.x = from.x; ball.y = from.y;
  fxLayer.addChild(ball);
  let t = 0; const dur = .3;
  const tick = (delta) => {
    t += delta / 60 / dur;
    if (t >= 1) {
      app.ticker.remove(tick); ball.destroy();
      spawnBurst(ev.x, ev.y, 0xff5030, 22, 8);
      spawnBurst(ev.x, ev.y - 20, 0xffb060, 12, 5);
      if (!ev.victims || !ev.victims.length) {
        floatText(ev.x, ev.y - 40, 'MISS', 0xaaaaaa, 26);
        return;
      }
      SFX.hit();
      for (const v of ev.victims) {
        const c = chars.get(v.id);
        if (!c) continue;
        if (v.blocked) { flashTint(c, 0x9fd8ff); SFX.block(); floatText(c.x, c.y - 170, 'BLOCK', 0x9fd8ff, 22); }
        else if (v.reflected) { spawnBurst(c.x, c.y - 100, 0xffffff, 12, 4); floatText(c.x, c.y - 170, 'REFLECT!', 0xffffff, 22); }
        else { flashTint(c, 0xff5c5c); floatText(c.x, c.y - 170, '-' + v.dmg, 0xff6b6b, 26); }
      }
      return;
    }
    ball.x = from.x + (ev.x - from.x) * t;
    ball.y = from.y + (ev.y - from.y) * t - Math.sin(t * Math.PI) * 120;
  };
  app.ticker.add(tick);
});

socket.on('bossSpawn', (b) => { setArenaBg(b.bg); buildBoss(b); });

socket.on('bossDefeated', (ev) => {
  bossDeathAnim();
  SFX.win();
  confettiBurst();
  document.getElementById('winName').textContent = '👹 ' + ev.name + '  Lv.' + ev.level;
  document.getElementById('winner').classList.add('show');
  setTimeout(() => document.getElementById('winner').classList.remove('show'), 5000); // ค้าง 5 วิ
});

socket.on('levelUp', (ev) => {
  const c = chars.get(ev.id);
  if (c) {
    spawnBurst(c.x, c.y - 100, 0xffd24d, 18, 5);
    floatText(c.x, c.y - 200, 'LEVEL UP! Lv.' + ev.level, 0xffd24d, 24);
  }
});
socket.on('hit', (ev) => {
  const c = chars.get(ev.id);
  if (c) { flashTint(c, 0xff5c5c); damageNumber(c, ev.dmg); SFX.hit(); }
});
socket.on('blocked', (ev) => {
  const c = chars.get(ev.id);
  if (c) { flashTint(c, 0x9fd8ff); SFX.block(); spawnBurst(c.x, c.y - 100, 0x9fd8ff, 10, 3); }
});
socket.on('reflected', (ev) => {
  const c = chars.get(ev.from);
  if (c) spawnBurst(c.x, c.y - 100, 0xffffff, 12, 4);
});
socket.on('gacha', (ev) => showGacha(ev));
socket.on('death', (ev) => removeChar(ev.id, true));
socket.on('remove', (ev) => removeChar(ev.id, false));
socket.on('reset', () => {
  for (const id of [...chars.keys()]) removeChar(id, false);
  document.getElementById('winner').classList.remove('show');
});
socket.on('likeFeed', addFeed);
socket.on('mc', (ev) => { if (started) mcSay(ev.key, ev.params, ev.priority); });

function confettiBurst() {
  for (let i = 0; i < 5; i++) setTimeout(() =>
    spawnBurst(200 + Math.random() * 600, 400 + Math.random() * 400,
      [0xff3d8b, 0x31e6ff, 0xffd24d][i % 3], 20, 7), i * 220);
}

/* ================= start / wake lock ================= */
let wakeLock = null;
async function acquireWakeLock() {
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch { /* unsupported */ }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && started) {
    acquireWakeLock();
    if (AC && AC.state === 'suspended') AC.resume().catch(() => {});
  }
});
document.getElementById('startBtn').onclick = () => {
  started = true;
  unlockAudio();
  try { speechSynthesis.speak(new SpeechSynthesisUtterance('')); } catch {}
  acquireWakeLock();
  startBgm();
  document.getElementById('startOverlay').style.display = 'none';
  layout();
  lastRuleAt = 0;
};

applyLang();
layout();
</script>
